aliases:
  brew:
    - brew-link-node-tools
    - brew-upgrade
    - brew-relink-node-tools
    - brew-cleanup
  zimfw:
    - zimfw-upgrade
    - zimfw-update
  cargo:
    - cargo-install-update
  npm:
    - node-package-managers
  pnpm:
    - node-package-managers

jobs:
  - name: brew-link-node-tools
    label: Homebrew node tool links
    phase: core
    command:
      - sh
      - -c
      - if brew list --formula node >/dev/null 2>&1; then brew link --overwrite node; fi
    required_commands: ["brew", "sh"]
    optional: true
    log_name: brew-link-node-tools.log

  - name: brew-upgrade
    label: Homebrew upgrade
    phase: core
    command: ["brew", "upgrade", "--greedy", "--force"]
    required_commands: ["brew", "sudo"]
    optional: false
    log_name: brew-upgrade.log
    sudo_preflight: true

  - name: brew-relink-node-tools
    label: Homebrew node tool relinks
    phase: core
    command:
      - sh
      - -c
      - if brew list --formula node >/dev/null 2>&1; then brew link --overwrite node; fi
    required_commands: ["brew", "sh"]
    optional: true
    log_name: brew-relink-node-tools.log

  - name: brew-cleanup
    label: Homebrew cleanup
    phase: core
    command: ["brew", "cleanup", "--prune=all"]
    required_commands: ["brew"]
    optional: false
    log_name: brew-cleanup.log

  - name: zimfw-upgrade
    label: Zim upgrade
    phase: core
    command: ["zsh", "-lc", "source \"$HOME/.zim/init.zsh\"; zimfw upgrade"]
    required_commands: ["zsh"]
    required_paths: ["$HOME/.zim/init.zsh"]
    optional: true
    log_name: zimfw-upgrade.log

  - name: zimfw-update
    label: Zim update
    phase: parallel
    command: ["zsh", "-lc", "source \"$HOME/.zim/init.zsh\"; zimfw update"]
    required_commands: ["zsh"]
    required_paths: ["$HOME/.zim/init.zsh"]
    optional: true
    log_name: zimfw-update.log

  - name: gup
    label: Go tools
    phase: parallel
    command: ["gup", "update"]
    required_commands: ["gup"]
    optional: true
    log_name: gup.log

  - name: gcloud
    label: Google Cloud SDK
    phase: parallel
    command: ["gcloud", "components", "update", "--quiet"]
    required_commands: ["gcloud"]
    optional: true
    log_name: gcloud.log

  - name: mas
    label: Mac App Store
    phase: parallel
    command: ["mas", "upgrade"]
    required_commands: ["mas", "sudo"]
    optional: true
    log_name: mas.log
    sudo_preflight: true

  - name: node-package-managers
    label: Node package managers
    phase: parallel
    command:
      - sh
      - -c
      - npm update --global && corepack install --global pnpm@latest && pnpm update --global
    required_commands: ["sh", "npm", "corepack", "pnpm"]
    optional: true
    log_name: node-package-managers.log

  - name: rustup
    label: Rust toolchain
    phase: parallel
    command: ["rustup", "update"]
    required_commands: ["rustup"]
    optional: true
    log_name: rustup.log

  - name: cargo-install-update
    label: Cargo installed crates
    phase: parallel
    command: ["cargo", "install-update", "--all", "--git"]
    required_commands: ["cargo", "cargo-install-update"]
    optional: true
    log_name: cargo-install-update.log

  - name: skills
    label: Agent skills
    phase: parallel
    command: ["python3", "$HOME/.agents/skills/update.py"]
    required_commands: ["python3"]
    required_paths: ["$HOME/.agents/skills/update.py"]
    optional: true
    log_name: skills.log
